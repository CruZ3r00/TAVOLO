<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ristorante Demo - Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #c0392b;
            --primary-light: #e74c3c;
            --dark: #2c3e50;
            --gold: #f39c12;
            --bg: #fdf6f0;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
        }
        .hero {
            background: linear-gradient(135deg, var(--dark) 0%, #1a1a2e 50%, #34495e 100%);
            color: white;
            padding: 3rem 0;
            text-align: center;
        }
        .hero-logo {
            max-height: 100px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            margin-bottom: 1rem;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .hero p {
            opacity: 0.8;
            font-size: 1.1rem;
        }
        .category-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            border-bottom: 2px solid #eee;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .category-btn {
            border: none;
            background: none;
            padding: 0.85rem 1.5rem;
            font-weight: 600;
            color: #888;
            border-bottom: 3px solid transparent;
            transition: all 0.25s;
            white-space: nowrap;
            cursor: pointer;
        }
        .category-btn:hover, .category-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .menu-section { padding: 2rem 0; }
        .menu-section h2 {
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 3px solid var(--primary);
            display: inline-block;
        }
        .menu-card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.25s, box-shadow 0.25s;
            background: white;
        }
        .menu-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }
        .menu-card img {
            height: 200px;
            object-fit: cover;
            width: 100%;
        }
        .menu-card .card-body { padding: 1.25rem; }
        .menu-card .price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }
        .allergen-badge {
            font-size: 0.7rem;
            padding: 0.25em 0.5em;
        }
        .loading-state {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-state {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        footer {
            background: var(--dark);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        footer a { color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading" class="loading-state">
        <div class="text-center">
            <div class="spinner-border text-danger mb-3" style="width:3rem;height:3rem;" role="status"></div>
            <p class="text-muted fs-5">Caricamento menu...</p>
        </div>
    </div>

    <!-- Errore -->
    <div id="error" class="error-state" style="display:none;">
        <div class="text-center">
            <i class="bi bi-exclamation-triangle text-warning" style="font-size:4rem;"></i>
            <h3 class="mt-3">Impossibile caricare il menu</h3>
            <p class="text-muted" id="error-msg">Riprova piu' tardi.</p>
        </div>
    </div>

    <!-- Contenuto menu -->
    <div id="content" style="display:none;">
        <!-- Hero -->
        <section class="hero">
            <div class="container">
                <img id="logo" src="" alt="" class="hero-logo" style="display:none;">
                <h1 id="restaurant-name"></h1>
                <p><i class="bi bi-book me-1"></i>Il nostro menu</p>
            </div>
        </section>

        <!-- Navigazione categorie -->
        <nav class="category-nav">
            <div class="container">
                <div class="d-flex overflow-auto py-1 gap-1" id="cat-nav"></div>
            </div>
        </nav>

        <!-- Griglia menu -->
        <div class="container menu-section">
            <div id="menu-grid"></div>
        </div>

        <!-- Footer -->
        <footer>
            <div class="container">
                <p class="mb-1 opacity-75">Menu digitale gestito con <strong>MenuCMS</strong></p>
                <p class="mb-0 small opacity-50">Dati aggiornati in tempo reale tramite API</p>
            </div>
        </footer>
    </div>

    <script>
        // Configurazione: l'API base e' lo stesso server Strapi che serve questa pagina
        const API_BASE = window.location.origin;

        // Ricava lo username dall'URL: /sites/{username}
        const pathParts = window.location.pathname.split('/');
        const SITE_USERNAME = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];

        let allElements = [];

        async function init() {
            try {
                // 1. Trova il documentId dell'utente tramite username
                const userRes = await fetch(`${API_BASE}/api/users?filters[username][$eq]=${SITE_USERNAME}`);
                if (!userRes.ok) throw new Error('Utente non trovato');
                const users = await userRes.json();
                if (!users || users.length === 0) throw new Error('Ristorante non trovato');

                const userDocumentId = users[0].documentId;

                // 2. Chiama l'API pubblica del menu
                const menuRes = await fetch(`${API_BASE}/api/menus/public/${userDocumentId}`);
                if (!menuRes.ok) throw new Error('Menu non disponibile');
                const result = await menuRes.json();
                const data = result.data;

                allElements = data.elements || [];

                // Render
                renderHero(data);
                renderCategories(data.categories || []);
                renderMenu(allElements);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.title = `${data.restaurant_name || SITE_USERNAME} - Menu`;
            } catch (err) {
                console.error('Errore:', err);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-msg').textContent = err.message;
                document.getElementById('error').style.display = 'flex';
            }
        }

        function renderHero(data) {
            document.getElementById('restaurant-name').textContent = data.restaurant_name || SITE_USERNAME;
            if (data.logo_url) {
                const logo = document.getElementById('logo');
                logo.src = `${API_BASE}${data.logo_url}`;
                logo.alt = data.restaurant_name;
                logo.style.display = 'inline-block';
            }
        }

        function renderCategories(categories) {
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = '';

            // Bottone "Tutti"
            const allBtn = document.createElement('button');
            allBtn.className = 'category-btn active';
            allBtn.textContent = 'Tutti';
            allBtn.onclick = function() { filterCategory(null, this); };
            nav.appendChild(allBtn);

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.textContent = cat;
                btn.onclick = function() { filterCategory(cat, this); };
                nav.appendChild(btn);
            });
        }

        function renderMenu(elements) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';

            if (elements.length === 0) {
                grid.innerHTML = `
                    <div class="text-center py-5">
                        <i class="bi bi-journal-x text-muted" style="font-size:3rem;"></i>
                        <p class="mt-3 text-muted fs-5">Nessun elemento nel menu.</p>
                    </div>`;
                return;
            }

            // Raggruppa per categoria
            const grouped = {};
            elements.forEach(el => {
                if (!grouped[el.category]) grouped[el.category] = [];
                grouped[el.category].push(el);
            });

            Object.keys(grouped).forEach(category => {
                const section = document.createElement('div');
                section.className = 'mb-5';
                section.setAttribute('data-category', category);
                section.innerHTML = `<h2><i class="bi bi-tag me-2"></i>${category}</h2>`;

                const row = document.createElement('div');
                row.className = 'row g-4';

                grouped[category].forEach(el => {
                    const imgHtml = el.image_url
                        ? `<img src="${API_BASE}${el.image_full_url || el.image_url}" alt="${el.name}">`
                        : `<div class="bg-light d-flex align-items-center justify-content-center" style="height:200px">
                            <i class="bi bi-image text-muted" style="font-size:2.5rem;"></i>
                           </div>`;

                    const ingredientsHtml = el.ingredients && el.ingredients.length
                        ? `<p class="small text-muted mb-1"><i class="bi bi-list-ul me-1"></i>${el.ingredients.join(', ')}</p>`
                        : '';

                    const allergensHtml = el.allergens && el.allergens.length
                        ? `<div class="mt-2">${el.allergens.map(a =>
                            `<span class="badge bg-warning text-dark allergen-badge me-1"><i class="bi bi-exclamation-triangle me-1"></i>${a}</span>`
                          ).join('')}</div>`
                        : '';

                    const col = document.createElement('div');
                    col.className = 'col-sm-6 col-lg-4';
                    col.innerHTML = `
                        <div class="card menu-card shadow-sm h-100">
                            ${imgHtml}
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h5 class="fw-bold mb-0">${el.name}</h5>
                                    <span class="price">${parseFloat(el.price).toFixed(2)} &euro;</span>
                                </div>
                                ${ingredientsHtml}
                                ${allergensHtml}
                            </div>
                        </div>`;
                    row.appendChild(col);
                });

                section.appendChild(row);
                grid.appendChild(section);
            });
        }

        function filterCategory(category, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (!category) {
                renderMenu(allElements);
            } else {
                renderMenu(allElements.filter(el => el.category === category));
            }
        }

        // Avvio
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
